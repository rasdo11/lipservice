name: Daily Newsletter

on:
  schedule:
    # Preview: 9pm PST (Nov–Mar) = 05:00 UTC
    - cron: '0 5 * * *'
    # Preview: 9pm PDT (Mar–Nov) = 04:00 UTC
    - cron: '0 4 * * *'
    # Publish: 5:25am PDT (Mar–Nov) = 12:25 UTC
    - cron: '25 12 * * *'
    # Publish: 5:25am PST (Nov–Mar) = 13:25 UTC  /  PDT retry
    - cron: '25 13 * * *'
    # Publish: PST retry
    - cron: '25 14 * * *'
    # Publish: PST fallback
    - cron: '25 15 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish
          - preview

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate newsletter
        run: |
          INPUT_MODE="${{ inputs.mode }}"
          HOUR_UTC=$(date -u +%-H)
          # Preview runs at 4-5 UTC (9pm PDT/PST); publish at 12-15 UTC (5:25am PDT/PST + retries).
          # Use hour < 12 to detect preview when triggered by schedule; manual runs use INPUT_MODE.
          if [ "$INPUT_MODE" = "preview" ] || { [ -z "$INPUT_MODE" ] && [ "$HOUR_UTC" -lt 12 ]; }; then
            echo "Running in PREVIEW mode (tomorrow's issue → preview/) — UTC hour: $HOUR_UTC"
            PREVIEW=1 npm run generate
          else
            echo "Running in PUBLISH mode (promote preview or generate fresh) — UTC hour: $HOUR_UTC"
            npm run generate
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Lip Service Bot"
          git config user.email "bot@lipservice.dev"
          git add -A
          git diff --staged --quiet || git commit -m "Daily newsletter: $(TZ='America/Los_Angeles' date +'%B %d, %Y')"
          git pull --rebase origin HEAD
          git push origin HEAD
