name: Daily Newsletter

on:
  schedule:
    # Preview: 10pm PST = 06:00 UTC (generates tomorrow's issue to preview/)
    - cron: '0 6 * * *'
    # Publish: 6am PST = 14:00 UTC (promotes preview → live, or generates fresh)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish
          - preview

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate newsletter
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          INPUT_MODE="${{ inputs.mode }}"
          if [ "$SCHEDULE" = "0 6 * * *" ] || [ "$INPUT_MODE" = "preview" ]; then
            echo "Running in PREVIEW mode (tomorrow's issue → preview/)"
            PREVIEW=1 npm run generate
          else
            echo "Running in PUBLISH mode (promote preview or generate fresh)"
            npm run generate
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Lip Service Bot"
          git config user.email "bot@lipservice.dev"
          git add index.html issues/ preview/ 2>/dev/null || true
          git add -u
          git diff --staged --quiet || git commit -m "Daily newsletter: $(TZ='America/Los_Angeles' date +'%B %d, %Y')"
          git push
