name: Daily Newsletter

on:
  schedule:
    # Preview: 10pm PST (Nov–Mar) = 06:00 UTC
    - cron: '0 6 * * *'
    # Preview: 10pm PDT (Mar–Nov) = 05:00 UTC
    - cron: '0 5 * * *'
    # Publish: 6am PST (Nov–Mar) = 14:00 UTC  +retries at 15, 16, 17
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
    # Publish: 6am PDT (Mar–Nov) = 13:00 UTC  +retries at 14, 15, 16
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'publish'
        type: choice
        options:
          - publish
          - preview

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate newsletter
        run: |
          INPUT_MODE="${{ inputs.mode }}"
          HOUR_UTC=$(date -u +%-H)
          # Preview runs at 5am or 6am UTC (10pm PDT/PST); publish at 13pm or 14pm UTC (6am PDT/PST).
          # Use hour < 12 to detect preview when triggered by schedule; manual runs use INPUT_MODE.
          if [ "$INPUT_MODE" = "preview" ] || { [ -z "$INPUT_MODE" ] && [ "$HOUR_UTC" -lt 12 ]; }; then
            echo "Running in PREVIEW mode (tomorrow's issue → preview/) — UTC hour: $HOUR_UTC"
            PREVIEW=1 npm run generate
          else
            echo "Running in PUBLISH mode (promote preview or generate fresh) — UTC hour: $HOUR_UTC"
            npm run generate
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Robots Think Bot"
          git config user.email "bot@robotsthink.dev"
          git add -A
          git diff --staged --quiet || git commit -m "Daily newsletter: $(TZ='America/Los_Angeles' date +'%B %d, %Y')"
          git push
