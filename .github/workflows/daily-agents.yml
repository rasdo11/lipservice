name: Daily Supplement Agents

on:
  schedule:
    # 7am ET (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  run-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily briefing agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ROSS_EMAIL: ${{ secrets.ROSS_EMAIL }}
        run: node agents/daily-briefing.mjs
