name: Generate Issue

on:
  schedule:
    # Mon 8pm PST = Tue 04:00 UTC  (preview for Tuesday issue)
    - cron: '0 4 * * 2'
    # Fri 8pm PST = Sat 04:00 UTC  (preview for Saturday issue)
    - cron: '0 4 * * 6'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number — leave blank to auto-detect'
        required: false
        type: string
      brief:
        description: 'Editorial brief — paste notes, or leave blank to generate freely'
        required: false
        type: string
      mode:
        description: 'How to publish this issue'
        required: false
        default: 'immediate'
        type: choice
        options:
          - immediate
          - preview

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate issue
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          BRIEF: ${{ inputs.brief }}
          # Scheduled runs always use preview mode; manual runs default to immediate
          MODE: ${{ github.event_name == 'schedule' && 'preview' || inputs.mode || 'immediate' }}
        run: python .github/scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues/ issues.json index.html newsletter.html
          git add preview/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Issue ${{ steps.generate.outputs.ISSUE_NUMBER }}: ${{ steps.generate.outputs.ISSUE_TITLE }}"
          git pull --rebase origin main && git push
