name: Generate Lip Service Issue

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number (e.g. 6)'
        required: true
        type: string
      brief:
        description: 'Paste your weekly brief here'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          BRIEF: ${{ inputs.brief }}
        run: python .github/scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "Lip Service Bot"
          git config user.email "bot@lipservice.com"
          git add issues/ issues.json
          git commit -m "Issue ${{ inputs.issue_number }}: generated"
          git push origin HEAD
