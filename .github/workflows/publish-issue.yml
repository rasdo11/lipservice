name: Publish Issue

on:
  schedule:
    # Tue 4am PST = Tue 12:00 UTC
    - cron: '0 12 * * 2'
    # Sat 4am PST = Sat 12:00 UTC
    - cron: '0 12 * * 6'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish issue
        id: publish
        run: python .github/scripts/publish.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues/ issues.json index.html newsletter.html
          git rm --ignore-unmatch preview/issue-*.html preview/meta.json
          git diff --cached --quiet || git commit -m "Publish issue ${{ steps.publish.outputs.ISSUE_NUMBER }}: ${{ steps.publish.outputs.ISSUE_TITLE }}"
          git pull --rebase origin main && git push
