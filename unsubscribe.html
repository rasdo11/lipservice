<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe — Lip Service</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
<style>
  :root { --ink:#16120E; --cream:#FAF7F2; --rouge:#C13333; --warm:#9A8880; --divider:#E4DBD4; }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); color:var(--ink); font-family:'DM Sans',sans-serif; font-size:16px; line-height:1.6; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
  .top-bar { display:flex; justify-content:space-between; align-items:center; padding:20px 40px; border-bottom:1px solid var(--divider); }
  .top-bar-logo { font-family:'Playfair Display',serif; font-size:22px; font-weight:900; letter-spacing:-0.5px; color:var(--ink); text-decoration:none; }
  .top-bar-back { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--warm); text-decoration:none; font-weight:400; transition:color 0.2s; }
  .top-bar-back:hover { color:var(--ink); }
  main { flex:1; max-width:480px; width:100%; margin:0 auto; padding:80px 40px; text-align:center; }
  .eyebrow { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--rouge); font-weight:500; margin-bottom:16px; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(28px,5vw,42px); font-weight:900; line-height:1.1; letter-spacing:-1.5px; margin-bottom:16px; }
  h1 em { font-style:italic; color:var(--rouge); }
  .sub { font-size:15px; color:var(--warm); font-weight:300; margin-bottom:40px; line-height:1.6; }
  .form-input { width:100%; padding:14px 16px; border:1px solid var(--divider); border-radius:4px; background:#fff; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--ink); margin-bottom:12px; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:var(--ink); }
  .form-submit { width:100%; padding:14px; background:var(--ink); color:var(--cream); border:none; border-radius:4px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; letter-spacing:0.5px; cursor:pointer; transition:opacity 0.2s; }
  .form-submit:hover { opacity:0.85; }
  .form-submit:disabled { opacity:0.5; cursor:default; }
  .success { display:none; }
  .success.visible { display:block; }
  .success-headline { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; margin-bottom:8px; }
  .success-sub { font-size:14px; color:var(--warm); font-weight:300; }
  .error-msg { font-size:13px; color:var(--rouge); margin-top:8px; min-height:18px; }
  footer { border-top:1px solid var(--divider); padding:24px 40px; display:flex; justify-content:space-between; align-items:center; }
  .footer-logo { font-family:'Playfair Display',serif; font-size:16px; font-weight:900; color:var(--ink); }
  .footer-copy { font-size:11px; color:#C0B5AE; font-weight:300; }
  @media (max-width:600px) { .top-bar { padding:18px 20px; } main { padding:60px 20px; } footer { flex-direction:column; gap:8px; text-align:center; padding:20px; } }
</style>
</head>
<body>
<header class="top-bar">
  <a href="index.html" class="top-bar-logo">Lip Service</a>
  <a href="index.html" class="top-bar-back">← Home</a>
</header>
<main>
  <div class="eyebrow">Goodbye for now</div>
  <h1>We'll miss <em>you.</em></h1>
  <p class="sub">Enter your email below and we'll take you off the list.<br>No guilt trip. Promise.</p>

  <form id="unsubForm">
    <input class="form-input" type="email" name="email" placeholder="Your email address" autocomplete="email" required />
    <button class="form-submit" type="submit" id="unsubBtn">Unsubscribe</button>
    <div class="error-msg" id="unsubError"></div>
  </form>

  <div class="success" id="unsubSuccess">
    <div class="success-headline">You're off the list.</div>
    <div class="success-sub">No hard feelings. Come back whenever you're ready.</div>
  </div>
</main>
<footer>
  <div class="footer-logo">Lip Service</div>
  <div class="footer-copy">Weekly beauty. No apologies. © 2026</div>
</footer>
<script>
  document.getElementById('unsubForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('unsubBtn');
    const errEl = document.getElementById('unsubError');
    const email = this.email.value;
    btn.disabled = true;
    btn.textContent = 'Removing you…';
    errEl.textContent = '';
    try {
      await fetch('/api/unsubscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
    } catch (_) {}
    this.style.display = 'none';
    document.getElementById('unsubSuccess').classList.add('visible');
  });
</script>
</body>
</html>
